<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chasing Monitor — Agent Evaluation</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── RESET & ROOT ─────────────────────────────────────────── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --ink:       #0d0f14;
  --ink2:      #1c2030;
  --ink3:      #2d3348;
  --surface:   #f7f8fc;
  --surface2:  #eef0f6;
  --card:      #ffffff;
  --border:    rgba(0,0,0,0.08);
  --border2:   rgba(0,0,0,0.14);
  --blue:      #2563eb;
  --blue-light:#dbeafe;
  --orange:    #ea580c;
  --violet:    #7c3aed;
  --red:       #dc2626;
  --red-light: #fee2e2;
  --amber:     #d97706;
  --amber-light:#fef3c7;
  --emerald:   #059669;
  --emerald-light:#d1fae5;
  --text:      #0d0f14;
  --muted:     #6b7280;
  --dim:       #9ca3af;
  --ff-head:   'Archivo', sans-serif;
  --ff-body:   'Space Grotesk', sans-serif;
  --ff-mono:   'JetBrains Mono', monospace;
  --radius:    12px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow:    0 4px 16px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.05);
  --shadow-lg: 0 20px 60px rgba(0,0,0,.12), 0 8px 24px rgba(0,0,0,.08);
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--ff-body);
  background: var(--surface);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  opacity: 0.4;
}

body::after {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(37,99,235,.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(37,99,235,.035) 1px, transparent 1px);
  background-size: 32px 32px;
}

/* ── HEADER ──────────────────────────────────────────────── */
header {
  position: sticky; top: 0; z-index: 200;
  background: rgba(247,248,252,0.85);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid var(--border);
  height: 64px;
  display: flex; align-items: center;
  padding: 0 28px;
  gap: 16px;
  animation: slideDown .4s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes slideDown {
  from { transform: translateY(-100%); opacity: 0; }
  to   { transform: translateY(0);     opacity: 1; }
}

.logo-mark {
  width: 36px; height: 36px;
  background: var(--ink2);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: var(--shadow-sm);
  position: relative; overflow: hidden;
}
.logo-mark::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 60%);
}
.logo-mark svg { width: 20px; height: 20px; }

.logo-stack { display: flex; flex-direction: column; gap: 1px; }
.logo-name {
  font-family: var(--ff-head); font-weight: 800; font-size: 15px;
  letter-spacing: -0.02em; color: var(--ink);
}
.logo-sub {
  font-family: var(--ff-mono); font-size: 9px; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--blue);
}

.h-spacer { flex: 1; }

.h-chip {
  font-family: var(--ff-mono); font-size: 10px; letter-spacing: 0.06em;
  text-transform: uppercase; padding: 5px 12px; border-radius: 50px;
  border: 1px solid var(--border); color: var(--muted);
  background: var(--card);
  transition: all .2s;
}
.h-chip.live {
  border-color: var(--blue); color: var(--blue);
  background: var(--blue-light);
}
.h-chip.live::before {
  content: ''; display: inline-block; width: 6px; height: 6px;
  border-radius: 50%; background: var(--blue); margin-right: 6px;
  animation: pulse 1.4s ease infinite;
}
@keyframes pulse {
  0%,100% { opacity:1; transform: scale(1); }
  50%      { opacity:.4; transform: scale(.8); }
}

.h-btn {
  font-family: var(--ff-mono); font-size: 10px; letter-spacing: 0.06em;
  text-transform: uppercase; padding: 8px 16px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--card);
  color: var(--muted); cursor: pointer;
  transition: all .2s cubic-bezier(0.16, 1, 0.3, 1);
}
.h-btn:hover { border-color: var(--blue); color: var(--blue); transform: translateY(-1px); box-shadow: var(--shadow-sm); }

/* ── MAIN ────────────────────────────────────────────────── */
main {
  position: relative; z-index: 1;
  max-width: 1100px; margin: 0 auto;
  padding: 32px 24px 80px;
}

/* ── SECTION LABEL ───────────────────────────────────────── */
.slabel {
  font-family: var(--ff-mono); font-size: 10px; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--blue);
  display: flex; align-items: center; gap: 10px; margin-bottom: 18px;
}
.slabel::after { content: ''; flex:1; height: 1px; background: var(--border); }

/* ── SETUP PANEL ─────────────────────────────────────────── */
.setup-panel {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 28px 28px 24px;
  box-shadow: var(--shadow);
  animation: fadeUp .5s cubic-bezier(0.16, 1, 0.3, 1);
  margin-bottom: 24px;
  position: relative; overflow: hidden;
}
.setup-panel::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--blue), var(--violet));
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.setup-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr auto;
  gap: 14px; align-items: end;
}

.field { display: flex; flex-direction: column; gap: 6px; }
.field label {
  font-family: var(--ff-mono); font-size: 10px; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--muted);
}
.field input, .field select {
  background: var(--surface2); border: 1.5px solid var(--border);
  color: var(--text); font-family: var(--ff-body); font-size: 14px; font-weight: 500;
  padding: 11px 14px; border-radius: 9px; outline: none;
  transition: border-color .2s, box-shadow .2s, background .2s;
}
.field input::placeholder { color: var(--dim); }
.field input:focus, .field select:focus {
  background: var(--card); border-color: var(--blue);
  box-shadow: 0 0 0 4px rgba(37,99,235,.1);
}

/* ── BUTTONS ─────────────────────────────────────────────── */
.btn-primary {
  background: var(--ink2); color: #fff;
  font-family: var(--ff-head); font-weight: 700; font-size: 13px;
  letter-spacing: 0.04em; padding: 11px 24px; border: none;
  border-radius: 9px; cursor: pointer;
  transition: all .2s cubic-bezier(0.16, 1, 0.3, 1);
  position: relative; overflow: hidden;
}
.btn-primary::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 60%);
  opacity: 0; transition: opacity .2s;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(13,15,20,.2); }
.btn-primary:hover::after { opacity: 1; }
.btn-primary:active { transform: translateY(0); }

.btn-ghost {
  background: transparent; color: var(--muted);
  font-family: var(--ff-mono); font-size: 11px; letter-spacing: 0.06em;
  text-transform: uppercase; padding: 10px 18px;
  border: 1.5px solid var(--border); border-radius: 9px; cursor: pointer;
  transition: all .2s;
}
.btn-ghost:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }

.btn-danger {
  background: transparent; color: var(--red);
  font-family: var(--ff-mono); font-size: 11px; letter-spacing: 0.06em;
  text-transform: uppercase; padding: 10px 18px;
  border: 1.5px solid rgba(220,38,38,.25); border-radius: 9px; cursor: pointer;
  transition: all .2s;
}
.btn-danger:hover { background: var(--red-light); border-color: var(--red); }

.btn-save {
  background: var(--emerald); color: #fff;
  font-family: var(--ff-head); font-weight: 700; font-size: 13px;
  letter-spacing: 0.04em; padding: 11px 24px; border: none;
  border-radius: 9px; cursor: pointer; display: flex; align-items: center; gap: 8px;
  transition: all .2s cubic-bezier(0.16, 1, 0.3, 1);
}
.btn-save:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(5,150,105,.3); }
.btn-save:active { transform: translateY(0); }
.btn-save:disabled { opacity: .6; cursor: not-allowed; transform: none; box-shadow: none; }

/* ── SESSION BAR ─────────────────────────────────────────── */
.session-bar {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 24px; margin-bottom: 24px;
  display: none; align-items: center; gap: 28px; flex-wrap: wrap;
  box-shadow: var(--shadow-sm);
  position: relative; overflow: hidden;
}
.session-bar::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
  background: linear-gradient(180deg, var(--blue), var(--violet));
}
.session-bar.show {
  display: flex;
  animation: fadeUp .4s cubic-bezier(0.16, 1, 0.3, 1);
}

.sbi { display: flex; flex-direction: column; gap: 2px; }
.sbi-l {
  font-family: var(--ff-mono); font-size: 9px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--dim);
}
.sbi-v {
  font-family: var(--ff-head); font-weight: 700; font-size: 15px; color: var(--text);
}

.score-ring {
  width: 56px; height: 56px; border-radius: 50%;
  border: 3px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--ff-head); font-weight: 800; font-size: 14px;
  transition: all .4s cubic-bezier(0.16, 1, 0.3, 1);
  position: relative;
}
.score-ring.red   { border-color: var(--red);     color: var(--red);     }
.score-ring.amber { border-color: var(--amber);   color: var(--amber);   }
.score-ring.green { border-color: var(--emerald); color: var(--emerald); }

/* ── EVAL AREA ───────────────────────────────────────────── */
#eval-area { display: none; }
#eval-area.show { display: block; }

/* ── PROGRESS BAR ────────────────────────────────────────── */
.progress-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 22px; margin-bottom: 24px;
  display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
  box-shadow: var(--shadow-sm);
}
.prog-track {
  flex: 1; min-width: 140px; height: 6px;
  background: var(--surface2); border-radius: 3px; overflow: hidden;
}
.prog-fill {
  height: 100%; width: 0%; border-radius: 3px;
  background: linear-gradient(90deg, var(--blue), var(--violet));
  transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}
.prog-pct {
  font-family: var(--ff-mono); font-weight: 600; font-size: 13px; min-width: 36px;
}

.dist-item {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--ff-body); font-size: 12px; color: var(--muted);
}
.dist-dot {
  width: 8px; height: 8px; border-radius: 50%;
}

/* ── CHAPTER HEADER ──────────────────────────────────────── */
.chapter-hd {
  display: flex; align-items: center; gap: 14px;
  margin: 40px 0 14px; padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.chapter-tag {
  background: var(--orange); color: #fff;
  font-family: var(--ff-mono); font-size: 9px; letter-spacing: 0.12em;
  text-transform: uppercase; padding: 3px 10px; border-radius: 4px;
  font-weight: 600;
}
.chapter-title {
  font-family: var(--ff-head); font-weight: 800; font-size: 17px; letter-spacing: -0.01em;
}
.chapter-count {
  font-family: var(--ff-mono); font-size: 10px; color: var(--dim); margin-left: auto;
}

/* ── BEHAVIORS GRID ──────────────────────────────────────── */
.behaviors-grid { display: flex; flex-direction: column; gap: 6px; }

/* ── BEHAVIOR CARD ───────────────────────────────────────── */
.bcard {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: box-shadow .25s, transform .25s;
  position: relative;
}
.bcard:hover { box-shadow: var(--shadow); }

.bcard-stripe {
  position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--border); border-radius: 3px 0 0 3px;
  transition: background .3s;
}
.bcard.score-0 .bcard-stripe { background: var(--red);     }
.bcard.score-1 .bcard-stripe { background: var(--amber);   }
.bcard.score-2 .bcard-stripe { background: var(--emerald); }

.bcard-top {
  display: flex; align-items: center; cursor: pointer; user-select: none;
  padding-left: 3px;
}

.bcard-num {
  font-family: var(--ff-mono); font-size: 11px; color: var(--dim);
  width: 52px; text-align: center; padding: 16px 0; flex-shrink: 0;
}

.bcard-body { flex: 1; padding: 14px 12px; min-width: 0; }
.bcard-title {
  font-family: var(--ff-head); font-weight: 700; font-size: 13px;
  letter-spacing: -0.01em; line-height: 1.3; margin-bottom: 3px;
}
.bcard-trigger {
  font-size: 11.5px; color: var(--muted); line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical;
  overflow: hidden;
}
.positive-tag {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--emerald-light); color: var(--emerald);
  font-family: var(--ff-mono); font-size: 9px; letter-spacing: 0.08em;
  text-transform: uppercase; padding: 2px 8px; border-radius: 4px;
  margin-left: 8px; vertical-align: middle; font-weight: 600;
}

.bcard-ctrl {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 16px; flex-shrink: 0;
}

.sbtn-group { display: flex; gap: 4px; }
.sbtn {
  width: 34px; height: 34px; border-radius: 8px;
  border: 1.5px solid var(--border); background: transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .15s cubic-bezier(0.16, 1, 0.3, 1);
}
.sbtn:hover { transform: scale(1.1); }

.sbtn[data-s="0"] { color: var(--red); }
.sbtn[data-s="0"].active { background: var(--red); border-color: var(--red); color: #fff; }
.sbtn[data-s="0"]:hover { border-color: var(--red); }

.sbtn[data-s="1"] { color: var(--amber); }
.sbtn[data-s="1"].active { background: var(--amber); border-color: var(--amber); color: #fff; }
.sbtn[data-s="1"]:hover { border-color: var(--amber); }

.sbtn[data-s="2"] { color: var(--emerald); }
.sbtn[data-s="2"].active { background: var(--emerald); border-color: var(--emerald); color: #fff; }
.sbtn[data-s="2"]:hover { border-color: var(--emerald); }

.xbtn {
  width: 30px; height: 30px; background: transparent;
  border: 1.5px solid var(--border); color: var(--dim); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px; transition: all .2s; flex-shrink: 0;
}
.xbtn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }
.xbtn svg { transition: transform .3s cubic-bezier(0.16, 1, 0.3, 1); }
.bcard.open .xbtn svg { transform: rotate(180deg); }

/* ── CARD DETAIL ─────────────────────────────────────────── */
.bcard-detail {
  max-height: 0; overflow: hidden;
  transition: max-height .4s cubic-bezier(0.16, 1, 0.3, 1);
  background: #fafbfd;
  border-top: 1px solid transparent;
}
.bcard.open .bcard-detail {
  max-height: 400px;
  border-top-color: var(--border);
}

.detail-inner {
  padding: 18px 18px 18px 68px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
}

.dblock .dl { font-family: var(--ff-mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--blue); margin-bottom: 6px; }
.dblock p { font-size: 12px; color: var(--muted); line-height: 1.6; }

.dnote label { font-family: var(--ff-mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); display: block; margin-bottom: 6px; }
.dnote textarea {
  width: 100%; background: var(--card); border: 1.5px solid var(--border);
  font-family: var(--ff-body); font-size: 12px; padding: 8px 10px;
  resize: vertical; min-height: 60px; border-radius: 8px; outline: none;
  transition: border-color .2s;
}
.dnote textarea:focus { border-color: var(--blue); }

.hint-box {
  background: rgba(124,58,237,.07); border: 1px solid rgba(124,58,237,.2);
  border-radius: 8px; padding: 12px 14px; margin: 12px 0 0;
  grid-column: 1/-1;
}
.hint-box .hl { font-family: var(--ff-mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--violet); margin-bottom: 6px; }
.hint-box p { font-size: 11.5px; color: #5b21b6; line-height: 1.6; }

/* ── ACTION ROW ──────────────────────────────────────────── */
.action-row {
  display: flex; gap: 10px; flex-wrap: wrap;
  margin-top: 28px; padding-top: 24px; border-top: 1px solid var(--border);
}

/* ── TOAST ───────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--ink2); color: #fff; padding: 12px 22px;
  border-radius: 50px; font-family: var(--ff-mono); font-size: 12px; letter-spacing: 0.06em;
  box-shadow: var(--shadow-lg); z-index: 500;
  transition: transform .4s cubic-bezier(0.16, 1, 0.3, 1), opacity .4s;
  opacity: 0; pointer-events: none;
  display: flex; align-items: center; gap: 8px;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast.ok   { background: var(--emerald); }
.toast.err  { background: var(--red); }

/* ── MODAL ───────────────────────────────────────────────── */
.overlay {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(13,15,20,.6);
  display: none; align-items: center; justify-content: center; padding: 24px;
  backdrop-filter: blur(4px);
}
.overlay.show { display: flex; }

.modal {
  background: var(--card); border-radius: 18px;
  max-width: 580px; width: 100%; max-height: 85vh; overflow-y: auto;
  padding: 32px; box-shadow: var(--shadow-lg);
  border: 1px solid var(--border);
  animation: popIn .3s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes popIn {
  from { transform: scale(.94) translateY(20px); opacity: 0; }
  to   { transform: scale(1) translateY(0); opacity: 1; }
}

/* ── HISTORY ─────────────────────────────────────────────── */
.hist-entry {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 18px;
  display: flex; align-items: center; gap: 16px;
  cursor: pointer; transition: all .2s;
}
.hist-entry:hover {
  border-color: var(--blue); transform: translateX(4px);
  box-shadow: var(--shadow);
}

/* ── RESPONSIVE ──────────────────────────────────────────── */
@media (max-width: 820px) {
  .setup-grid { grid-template-columns: 1fr 1fr; }
  .detail-inner { grid-template-columns: 1fr; }
  .bcard-trigger { display: none; }
}
@media (max-width: 560px) {
  .setup-grid { grid-template-columns: 1fr; }
  header { padding: 0 16px; }
  main { padding: 20px 14px 60px; }
}
</style>
</head>
<body>

<!-- ── HEADER ─────────────────────────────────────────────── -->
<header>
  <div class="logo-mark">
    <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="10" cy="10" r="7" stroke="#4a90d9" stroke-width="1.5"/>
      <circle cx="10" cy="10" r="3.5" stroke="white" stroke-width="1.5"/>
      <circle cx="10" cy="10" r="1.5" fill="white"/>
      <line x1="10" y1="2" x2="10" y2="5.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="10" y1="14.5" x2="10" y2="18" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="2" y1="10" x2="5.5" y2="10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="14.5" y1="10" x2="18" y2="10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="logo-stack">
    <span class="logo-name">CHASING MONITOR</span>
    <span class="logo-sub">Agent Evaluation System</span>
  </div>
  <div class="h-spacer"></div>
  <div class="h-chip live">Live Session</div>
  <div class="h-chip" id="hdr-date">—</div>
  <button class="h-btn" onclick="toggleHistory()">History</button>
</header>

<!-- ── MAIN ───────────────────────────────────────────────── -->
<main>

  <!-- Setup Panel -->
  <div class="setup-panel" id="setup-panel">
    <div class="slabel">New Evaluation Session</div>
    <div class="setup-grid">
      <div class="field">
        <label>Agent Name</label>
        <input type="text" id="agent-name" placeholder="e.g. Mark or Adam">
      </div>
      <div class="field">
        <label>Evaluator</label>
        <input type="text" id="evaluator-name" placeholder="Your name">
      </div>
      <div class="field">
        <label>Session Type</label>
        <select id="session-type">
          <option value="live">Live Monitoring</option>
          <option value="recorded">Recorded Review</option>
          <option value="coaching">Coaching</option>
          <option value="review">Periodic Review</option>
        </select>
      </div>
      <button class="btn-primary" onclick="startSession()">Start →</button>
    </div>
  </div>

  <!-- Session Bar -->
  <div class="session-bar" id="session-bar">
    <div class="sbi"><span class="sbi-l">Agent</span><span class="sbi-v" id="sb-agent">—</span></div>
    <div class="sbi"><span class="sbi-l">Evaluator</span><span class="sbi-v" id="sb-eval">—</span></div>
    <div class="sbi"><span class="sbi-l">Type</span><span class="sbi-v" id="sb-type">—</span></div>
    <div class="sbi"><span class="sbi-l">Rated</span><span class="sbi-v" id="sb-rated">0 / 22</span></div>
    <div style="flex:1"></div>
    <div style="display:flex; align-items:center; gap:10px;">
      <div>
        <div class="sbi-l" style="text-align:right">Score</div>
        <div class="sbi-l" style="text-align:right; margin-top:2px;" id="sb-grade">—</div>
      </div>
      <div class="score-ring" id="score-ring">—</div>
    </div>
    <button class="btn-ghost" onclick="resetSession()" style="margin-left:8px;">Reset</button>
  </div>

  <!-- Eval Area -->
  <div id="eval-area">

    <!-- Progress -->
    <div class="progress-card">
      <span style="font-family:var(--ff-mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);">Progress</span>
      <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
      <span class="prog-pct" id="prog-pct">0%</span>
      <div style="width:1px;height:22px;background:var(--border);"></div>
      <div class="dist-item"><div class="dist-dot" style="background:var(--red)"></div>Fail <strong id="bd0">0</strong></div>
      <div class="dist-item"><div class="dist-dot" style="background:var(--amber)"></div>Partial <strong id="bd1">0</strong></div>
      <div class="dist-item"><div class="dist-dot" style="background:var(--emerald)"></div>Pass <strong id="bd2">0</strong></div>
    </div>

    <!-- Cards -->
    <div id="behaviors-container"></div>

    <!-- Actions -->
    <div class="action-row">
      <button class="btn-save" onclick="submitEval()">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor"><path d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z"/></svg>
        Save to Google Sheets
      </button>
      <button class="btn-ghost" onclick="submitEvalLocal()">Save Local Only</button>
      <button class="btn-danger" onclick="clearScores()">Clear All</button>
    </div>
  </div>

  <!-- History Panel -->
  <div id="history-panel" style="display:none; margin-top:40px;">
    <div class="chapter-hd">
      <span class="chapter-tag">Archive</span>
      <span class="chapter-title">Evaluation History</span>
    </div>
    <div id="history-list" style="display:flex; flex-direction:column; gap:6px;"></div>
  </div>

</main>

<script>

// ════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════
let session = null;
let scores  = {};
let notes   = {};
let history = [];
try { history = JSON.parse(localStorage.getItem('cm_history_v2')) || []; } catch(e) { history = []; }

// ════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════
document.getElementById('hdr-date').textContent =
  new Date().toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });

// ════════════════════════════════════════════════════════
//  SESSION
// ════════════════════════════════════════════════════════
function startSession() {
  const agent     = document.getElementById('agent-name').value.trim();
  const evaluator = document.getElementById('evaluator-name').value.trim();
  const type      = document.getElementById('session-type').value;
  if (!agent || !evaluator) { showToast('Enter both Agent and Evaluator names', 'err'); return; }

  session = { agent, evaluator, type, startTime: new Date().toISOString() };
  scores = {}; notes = {};
  BEHAVIORS.forEach(b => { scores[b.id] = null; notes[b.id] = ''; });

  // Update session bar
  document.getElementById('sb-agent').textContent = agent;
  document.getElementById('sb-eval').textContent  = evaluator;
  document.getElementById('sb-type').textContent  = {
    live:'Live Monitoring', recorded:'Recorded Review',
    coaching:'Coaching', review:'Periodic Review'
  }[type];

  // Show session bar
  document.getElementById('session-bar').classList.add('show');

  // Show eval area
  document.getElementById('eval-area').style.display = 'block';

  // Render behaviors
  renderBehaviors();
  updateMeta();

  // Scroll to session bar
  document.getElementById('session-bar').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function resetSession() {
  BEHAVIORS.forEach(b => { scores[b.id] = null; notes[b.id] = ''; });
  document.querySelectorAll('.bcard').forEach(c => {
    c.classList.remove('score-0','score-1','score-2');
    c.querySelectorAll('.sbtn').forEach(b => b.classList.remove('active'));
  });
  document.querySelectorAll('.bcard-detail textarea').forEach(t => t.value = '');
  updateMeta();
  showToast('Scores cleared');
}
const clearScores = resetSession;

// ════════════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════════════
function renderBehaviors() {
  const c = document.getElementById('behaviors-container');
  c.innerHTML = '';
  renderChapter(c, 'CH.01', 'Fake Actions & Documentation', BEHAVIORS.filter(b => b.ch === 1));
  renderChapter(c, 'CH.02', 'Call Quality, Script & Decision Points', BEHAVIORS.filter(b => b.ch === 2));
}

function renderChapter(container, tag, title, items) {
  const hd = document.createElement('div');
  hd.className = 'chapter-hd';
  hd.innerHTML = `<span class="chapter-tag">${tag}</span><span class="chapter-title">${title}</span><span class="chapter-count">${items.length} items</span>`;
  container.appendChild(hd);
  const grid = document.createElement('div');
  grid.className = 'behaviors-grid';
  items.forEach((b, i) => grid.appendChild(buildCard(b, i + 1)));
  container.appendChild(grid);
}

function buildCard(b, num) {
  const card = document.createElement('div');
  card.className = 'bcard';
  card.id = 'card_' + b.id;

  const posTag = b.positive ? `<span class="positive-tag">+ Positive</span>` : '';

  card.innerHTML = `
    <div class="bcard-stripe"></div>
    <div class="bcard-top" onclick="toggleCard('${b.id}')">
      <div class="bcard-num">${String(num).padStart(2,'0')}</div>
      <div class="bcard-body">
        <div class="bcard-title">${b.title}${posTag}</div>
        <div class="bcard-trigger">${b.trigger}</div>
      </div>
      <div class="bcard-ctrl" onclick="event.stopPropagation()">
        <div class="sbtn-group">
          <button class="sbtn" data-s="0" onclick="setScore('${b.id}',0)" title="Fail">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/></svg>
          </button>
          <button class="sbtn" data-s="1" onclick="setScore('${b.id}',1)" title="Partial">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/><path d="M4 8a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1h-7A.5.5 0 0 1 4 8z"/></svg>
          </button>
          <button class="sbtn" data-s="2" onclick="setScore('${b.id}',2)" title="Pass">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M10.97 4.97a.75.75 0 0 1 1.07 1.05l-3.99 4.99a.75.75 0 0 1-1.08.02L4.324 8.384a.75.75 0 1 1 1.06-1.06l2.094 2.093 3.473-4.425a.267.267 0 0 1 .02-.022z"/></svg>
          </button>
        </div>
        <button class="xbtn" onclick="toggleCard('${b.id}')">
          <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" d="M1.646 4.646a.5.5 0 0 1 .708 0L8 10.293l5.646-5.647a.5.5 0 0 1 .708.708l-6 6a.5.5 0 0 1-.708 0l-6-6a.5.5 0 0 1 0-.708z"/></svg>
        </button>
      </div>
    </div>
    <div class="bcard-detail">
      <div class="detail-inner">
        <div class="dblock"><div class="dl">Trigger</div><p>${b.trigger}</p></div>
        <div class="dblock"><div class="dl">Impact</div><p>${b.impact}</p></div>
        <div class="dblock"><div class="dl">Detection Signal</div><p>${b.detect}</p></div>
        <div class="dblock dnote"><label>Evaluator Notes</label><textarea onchange="notes['${b.id}']=this.value" oninput="notes['${b.id}']=this.value"></textarea></div>
        <div class="hint-box"><div class="hl">TL Monitoring Hint</div><p>${b.hint}</p></div>
      </div>
    </div>`;

  return card;
}

function toggleCard(id) {
  document.getElementById('card_' + id)?.classList.toggle('open');
}

// ════════════════════════════════════════════════════════
//  SCORING
// ════════════════════════════════════════════════════════
function setScore(id, s) {
  scores[id] = s;
  const card = document.getElementById('card_' + id);
  if (!card) return;
  card.classList.remove('score-0','score-1','score-2');
  card.classList.add('score-' + s);
  card.querySelectorAll('.sbtn').forEach(btn =>
    btn.classList.toggle('active', parseInt(btn.dataset.s) === s)
  );
  updateMeta();
}

function updateMeta() {
  const rated = BEHAVIORS.filter(b => scores[b.id] !== null);
  const total = BEHAVIORS.length;
  const pct   = Math.round((rated.length / total) * 100);

  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-pct').textContent  = pct + '%';
  document.getElementById('sb-rated').textContent  = rated.length + ' / ' + total;

  const c0 = rated.filter(b => scores[b.id] === 0).length;
  const c1 = rated.filter(b => scores[b.id] === 1).length;
  const c2 = rated.filter(b => scores[b.id] === 2).length;
  document.getElementById('bd0').textContent = c0;
  document.getElementById('bd1').textContent = c1;
  document.getElementById('bd2').textContent = c2;

  const ring  = document.getElementById('score-ring');
  const grade = document.getElementById('sb-grade');
  if (rated.length === 0) {
    ring.textContent = '—'; ring.className = 'score-ring';
    grade.textContent = '—'; return;
  }
  const actual   = rated.reduce((s, b) => s + scores[b.id], 0);
  const scorePct = Math.round((actual / (rated.length * 2)) * 100);
  ring.textContent = scorePct + '%';
  if (scorePct >= 80) { ring.className = 'score-ring green'; grade.textContent = 'Satisfactory'; }
  else if (scorePct >= 60) { ring.className = 'score-ring amber'; grade.textContent = 'Needs Work'; }
  else { ring.className = 'score-ring red'; grade.textContent = 'Critical'; }
}

// ════════════════════════════════════════════════════════
//  BUILD PAYLOAD
// ════════════════════════════════════════════════════════
function buildPayload() {
  const rated    = BEHAVIORS.filter(b => scores[b.id] !== null);
  const actual   = rated.reduce((s, b) => s + scores[b.id], 0);
  const pct      = rated.length ? Math.round((actual / (rated.length * 2)) * 100) : 0;
  const grade    = pct >= 80 ? 'Satisfactory' : pct >= 60 ? 'Needs Work' : 'Critical';
  const fails    = rated.filter(b => scores[b.id] === 0).map(b => b.id);
  const partials = rated.filter(b => scores[b.id] === 1).map(b => b.id);
  const passes   = rated.filter(b => scores[b.id] === 2).map(b => b.id);

  return {
    sessionDate:  new Date().toLocaleString('en-GB'),
    agent:        session.agent,
    evaluator:    session.evaluator,
    sessionType:  session.type,
    score:        pct,
    grade,
    rated:        rated.length,
    total:        BEHAVIORS.length,
    failCount:    fails.length,
    partialCount: partials.length,
    passCount:    passes.length,
    scores:       { ...scores },
    notes:        { ...notes },
    fails, partials, passes
  };
}

// ════════════════════════════════════════════════════════
//  SUBMIT (with Google Sheets)
// ════════════════════════════════════════════════════════
async function submitEval() {
  const rated = BEHAVIORS.filter(b => scores[b.id] !== null);
  if (rated.length === 0) { showToast('Rate at least one behavior first', 'err'); return; }

  const payload = buildPayload();
  saveToHistory(payload);

  if (!WEBHOOK_URL || WEBHOOK_URL === 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE') {
    showToast('Webhook URL not set in code — saved locally only', '');
    showResultModal(payload);
    return;
  }

  const btn = document.querySelector('.btn-save');
  btn.disabled = true;
  btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg> Saving…`;

  try {
    await fetch(WEBHOOK_URL, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    showToast('Saved to Google Sheets', 'ok');
  } catch(err) {
    showToast('Sheet save failed — check webhook URL', 'err');
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor"><path d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z"/></svg> Save to Google Sheets`;
  }

  showResultModal(payload);
}

function submitEvalLocal() {
  const rated = BEHAVIORS.filter(b => scores[b.id] !== null);
  if (rated.length === 0) { showToast('Rate at least one behavior first', 'err'); return; }
  const payload = buildPayload();
  saveToHistory(payload);
  showToast('Saved locally', 'ok');
  showResultModal(payload);
}

function saveToHistory(payload) {
  const entry = { id: Date.now(), date: new Date().toISOString(), ...payload };
  history.unshift(entry);
  localStorage.setItem('cm_history_v2', JSON.stringify(history));
}

// ════════════════════════════════════════════════════════
//  RESULT MODAL
// ════════════════════════════════════════════════════════
function showResultModal(entry) {
  const sc    = entry.score;
  const color = sc >= 80 ? 'var(--emerald)' : sc >= 60 ? 'var(--amber)' : 'var(--red)';
  const grade = sc >= 80 ? 'SATISFACTORY'   : sc >= 60 ? 'NEEDS WORK'   : 'CRITICAL';
  const bkgd  = sc >= 80 ? 'var(--emerald-light)' : sc >= 60 ? 'var(--amber-light)' : 'var(--red-light)';

  const fails    = (entry.fails||[]).map(id => BEHAVIORS.find(b => b.id===id)).filter(Boolean);
  const partials = (entry.partials||[]).map(id => BEHAVIORS.find(b => b.id===id)).filter(Boolean);

  const makeList = (items, color) => items.length === 0
    ? `<p style="font-size:12px;color:var(--dim);padding:6px 0">None</p>`
    : items.map(b => `<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;">
        <span style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0;"></span>
        <span style="flex:1">${b.title}</span>
      </div>`).join('');

  document.getElementById('modal-body').innerHTML = `
    <div style="font-family:var(--ff-head);font-weight:800;font-size:22px;letter-spacing:-.02em;margin-bottom:2px;">${entry.agent}</div>
    <div style="font-family:var(--ff-mono);font-size:11px;color:var(--dim);margin-bottom:22px;">
      ${new Date(entry.date||Date.now()).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})} · ${entry.evaluator}
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px;">
      <div style="background:${bkgd};border-radius:10px;padding:16px 14px;">
        <div style="font-family:var(--ff-head);font-size:28px;font-weight:800;color:${color};">${sc}%</div>
        <div style="font-family:var(--ff-mono);font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-top:2px;">Score</div>
      </div>
      <div style="background:var(--surface2);border-radius:10px;padding:16px 14px;">
        <div style="font-family:var(--ff-head);font-size:22px;font-weight:700;">${entry.rated}/${entry.total}</div>
        <div style="font-family:var(--ff-mono);font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-top:2px;">Rated</div>
      </div>
      <div style="background:${bkgd};border-radius:10px;padding:16px 14px;">
        <div style="font-family:var(--ff-head);font-size:16px;font-weight:800;color:${color};">${grade}</div>
        <div style="font-family:var(--ff-mono);font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-top:2px;">Grade</div>
      </div>
    </div>
    <div style="font-family:var(--ff-mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:8px;">Fails (${fails.length})</div>
    ${makeList(fails,'var(--red)')}
    <div style="font-family:var(--ff-mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin:14px 0 8px;">Partial (${partials.length})</div>
    ${makeList(partials,'var(--amber)')}
    <div style="display:flex;gap:10px;margin-top:22px;padding-top:18px;border-top:1px solid var(--border);">
      <button class="btn-primary" onclick="closeModal();newSession()">New Evaluation</button>
      <button class="btn-ghost" onclick="closeModal()">Close</button>
    </div>`;
  document.getElementById('modal-overlay').classList.add('show');
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); }

function newSession() {
  session = null; scores = {}; notes = {};
  document.getElementById('session-bar').classList.remove('show');
  document.getElementById('eval-area').style.display = 'none';
  document.getElementById('agent-name').value = '';
  document.getElementById('evaluator-name').value = '';
  document.getElementById('behaviors-container').innerHTML = '';
}

// ════════════════════════════════════════════════════════
//  HISTORY
// ════════════════════════════════════════════════════════
function toggleHistory() {
  const p = document.getElementById('history-panel');
  const showing = p.style.display === 'block';
  p.style.display = showing ? 'none' : 'block';
  if (!showing) renderHistory();
}

function renderHistory() {
  const list = document.getElementById('history-list');
  if (history.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:32px;color:var(--dim);font-family:var(--ff-mono);font-size:12px;">No evaluations yet.</div>';
    return;
  }
  list.innerHTML = history.map((e, i) => {
    const prev  = history[i+1];
    const diff  = prev ? e.score - prev.score : null;
    const delta = diff === null ? '' : diff === 0 ? '= 0%' : diff > 0 ? `+${diff}%` : `-${Math.abs(diff)}%`;
    const dc    = diff === null ? 'var(--dim)' : diff > 0 ? 'var(--emerald)' : diff < 0 ? 'var(--red)' : 'var(--muted)';
    const sc    = e.score >= 80 ? 'var(--emerald)' : e.score >= 60 ? 'var(--amber)' : 'var(--red)';
    return `<div class="hist-entry" onclick="showHistDetail(${e.id})">
      <div style="font-family:var(--ff-mono);font-size:12px;color:var(--muted);width:100px;">${new Date(e.date).toLocaleDateString('en-GB',{day:'2-digit',month:'short'})}</div>
      <div style="font-weight:700;flex:1;font-family:var(--ff-head);">${e.agent}</div>
      <div style="font-size:11px;color:var(--dim);font-family:var(--ff-mono);">${e.sessionType||e.type||''}</div>
      <div style="font-family:var(--ff-head);font-weight:800;font-size:17px;color:${sc};">${e.score}%</div>
      <div style="font-size:11px;margin-left:10px;font-family:var(--ff-mono);color:${dc};">${delta}</div>
    </div>`;
  }).join('');
}

function showHistDetail(id) {
  const e = history.find(h => h.id === id);
  if (e) showResultModal(e);
}

// ════════════════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════════════════
let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = 'toast', 3200);
}
</script>
</body>
</html>
